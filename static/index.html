<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAN Camera Viewer</title>
<!-- No external JS needed — MJPEG streams natively in <img> tags -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* --- Toolbar --- */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
  }

  .toolbar h1 {
    font-size: 16px;
    font-weight: 600;
    margin-right: auto;
    color: #4fc3f7;
  }

  .toolbar button {
    padding: 6px 14px;
    border: 1px solid #444;
    background: #2a2a2a;
    color: #ccc;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }

  .toolbar button:hover { background: #3a3a3a; color: #fff; }
  .toolbar button.active { background: #4fc3f7; color: #000; border-color: #4fc3f7; }
  .toolbar button.primary { background: #2196f3; color: #fff; border-color: #2196f3; }
  .toolbar button.primary:hover { background: #1976d2; }

  /* --- Grid --- */
  .grid {
    flex: 1;
    display: grid;
    gap: 2px;
    padding: 2px;
    overflow: hidden;
  }

  .grid.g1 { grid-template-columns: 1fr; }
  .grid.g2 { grid-template-columns: 1fr 1fr; }
  .grid.g3 { grid-template-columns: 1fr 1fr 1fr; }
  .grid.g4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

  /* --- Camera Tile --- */
  .tile {
    position: relative;
    background: #111;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
  }

  .tile video, .tile img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    background: #000;
  }

  .tile .label {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(0,0,0,0.7);
    padding: 3px 8px;
    border-radius: 3px;
    font-size: 12px;
    pointer-events: none;
  }

  .tile .remove-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(220,20,20,0.8);
    border: none;
    color: #fff;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    line-height: 24px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .tile:hover .remove-btn { opacity: 1; }

  .tile .quality-btn {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.7);
    border: 1px solid #555;
    color: #ccc;
    padding: 3px 8px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 10;
  }

  .tile:hover .quality-btn { opacity: 1; }
  .tile .quality-btn.hd { color: #4fc3f7; border-color: #4fc3f7; }
  .tile .quality-btn.switching { opacity: 1; color: #ff9800; border-color: #ff9800; }

  /* --- Greeting overlay --- */
  .tile .greeting-overlay {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    border: 1px solid #4caf50;
    border-radius: 8px;
    padding: 8px 18px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    white-space: nowrap;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .tile .greeting-overlay.visible { opacity: 1; }

  .tile .greeting-overlay .greeting-icon {
    color: #4caf50;
    margin-right: 6px;
  }

  .tile .greeting-overlay .greeting-conf {
    font-size: 11px;
    color: #aaa;
    font-weight: 400;
    margin-left: 8px;
  }
  .tile .greeting-overlay .greeting-new {
    color: #ffb74d;
  }
  .tile .greeting-overlay .outfit-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-left: 6px;
    vertical-align: middle;
    border: 1px solid rgba(255,255,255,0.4);
  }
  .outfit-swatch {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 3px;
    vertical-align: middle;
    margin-right: 4px;
    border: 1px solid rgba(255,255,255,0.3);
  }

  /* --- Floating unknown faces bar --- */
  .unknown-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(20,20,20,0.95);
    border-top: 2px solid #ff9800;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
    overflow-x: auto;
    transition: transform 0.3s;
    transform: translateY(100%);
  }
  .unknown-bar.visible { transform: translateY(0); }
  .unknown-bar-label {
    color: #ff9800;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .unknown-bar-card {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 6px 10px;
    flex-shrink: 0;
  }
  .unknown-bar-card img {
    width: 48px;
    height: 48px;
    border-radius: 6px;
    object-fit: cover;
  }
  .unknown-bar-card input {
    width: 100px;
    padding: 4px 8px;
    border: 1px solid #555;
    background: #1a1a1a;
    color: #fff;
    border-radius: 4px;
    font-size: 13px;
  }
  .unknown-bar-card input:focus { border-color: #4fc3f7; outline: none; }
  .unknown-bar-card button {
    padding: 4px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
  }
  .unknown-bar-card .btn-save {
    background: #4caf50;
    color: #fff;
  }
  .unknown-bar-card .btn-save:hover { background: #66bb6a; }
  .unknown-bar-card .btn-ignore {
    background: #555;
    color: #ccc;
  }
  .unknown-bar-card .btn-ignore:hover { background: #666; }
  .unknown-bar-countdown {
    font-size: 10px;
    color: #999;
    text-align: center;
    margin-top: 2px;
  }

  .tile .offline-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.75);
    font-size: 14px;
    color: #f44;
  }

  .tile .offline-overlay .dot {
    width: 10px;
    height: 10px;
    background: #f44;
    border-radius: 50%;
    margin-right: 8px;
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* --- Fullscreen tile --- */
  .tile.fullscreen {
    position: fixed;
    inset: 0;
    z-index: 100;
    border-radius: 0;
  }

  /* --- Empty state --- */
  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #666;
    font-size: 18px;
    grid-column: 1 / -1;
  }

  /* --- Modal --- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: #1e1e1e;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 24px;
    width: 420px;
    max-width: 90vw;
  }

  .modal h2 {
    font-size: 18px;
    margin-bottom: 16px;
    color: #4fc3f7;
  }

  .modal label {
    display: block;
    font-size: 13px;
    margin-bottom: 4px;
    color: #aaa;
  }

  .modal input, .modal select {
    width: 100%;
    padding: 8px 10px;
    margin-bottom: 12px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #2a2a2a;
    color: #eee;
    font-size: 14px;
  }

  .modal .actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 8px;
  }

  .modal .actions button {
    padding: 8px 18px;
    border: 1px solid #444;
    background: #333;
    color: #ccc;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
  }

  .modal .actions button.primary {
    background: #2196f3;
    color: #fff;
    border-color: #2196f3;
  }

  /* --- Discover results --- */
  .discover-list {
    max-height: 300px;
    overflow-y: auto;
    margin-bottom: 12px;
  }

  .discover-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: #2a2a2a;
    border-radius: 4px;
    margin-bottom: 6px;
  }

  .discover-item span { font-size: 13px; }
  .discover-item button {
    padding: 4px 12px;
    font-size: 12px;
    background: #4fc3f7;
    border: none;
    color: #000;
    border-radius: 3px;
    cursor: pointer;
  }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #444;
    border-top-color: #4fc3f7;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* --- Faces Modal (wide) --- */
  .modal.wide { width: 820px; max-height: 85vh; display: flex; flex-direction: column; }
  .modal.wide .modal-body { flex: 1; overflow-y: auto; min-height: 0; }

  .face-tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid #333;
    margin-bottom: 16px;
  }

  .face-tabs button {
    padding: 8px 20px;
    background: none;
    border: none;
    color: #888;
    font-size: 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
  }

  .face-tabs button:hover { color: #ccc; }
  .face-tabs button.active { color: #4fc3f7; border-bottom-color: #4fc3f7; }

  .face-tab-content { display: none; }
  .face-tab-content.active { display: block; }

  /* Face grid */
  .face-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
  }

  .face-card {
    background: #2a2a2a;
    border-radius: 6px;
    overflow: hidden;
    text-align: center;
  }

  .face-card img {
    width: 100%;
    height: 130px;
    object-fit: cover;
    display: block;
    background: #111;
  }

  .face-card .face-info {
    padding: 8px;
  }

  .face-card .face-name {
    font-size: 13px;
    font-weight: 600;
    color: #eee;
    margin-bottom: 2px;
  }

  .face-card .face-meta {
    font-size: 11px;
    color: #888;
    margin-bottom: 6px;
  }

  .face-card input[type="text"] {
    width: calc(100% - 8px);
    padding: 4px 6px;
    margin: 0 auto 6px;
    border: 1px solid #444;
    border-radius: 3px;
    background: #1a1a1a;
    color: #eee;
    font-size: 12px;
    display: block;
  }

  .face-card .face-actions {
    display: flex;
    gap: 4px;
    padding: 0 4px 8px;
  }

  .face-card .face-actions button {
    flex: 1;
    padding: 4px 0;
    border: 1px solid #444;
    border-radius: 3px;
    font-size: 11px;
    cursor: pointer;
    background: #333;
    color: #ccc;
    transition: all 0.15s;
  }

  .face-card .face-actions button.save { background: #2196f3; color: #fff; border-color: #2196f3; }
  .face-card .face-actions button.ignore { background: #555; }
  .face-card .face-actions button.delete { background: #c62828; color: #fff; border-color: #c62828; }

  /* Sightings log table */
  .sightings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .sightings-table th {
    text-align: left;
    padding: 8px 10px;
    background: #2a2a2a;
    color: #aaa;
    font-weight: 600;
    border-bottom: 1px solid #444;
  }

  .sightings-table td {
    padding: 6px 10px;
    border-bottom: 1px solid #2a2a2a;
    vertical-align: middle;
  }

  .sightings-table img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
    vertical-align: middle;
    margin-right: 6px;
    background: #111;
  }

  .face-empty {
    text-align: center;
    color: #666;
    padding: 40px 0;
    font-size: 14px;
  }

  .face-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
  }

  .face-badge.unknown { background: #ff9800; color: #000; }
  .face-badge.known { background: #4caf50; color: #fff; }

  /* --- Customer detail panel --- */
  .customer-detail {
    display: none;
  }
  .customer-detail.open {
    display: block;
  }
  .cd-back {
    background: none;
    border: none;
    color: #4fc3f7;
    font-size: 13px;
    cursor: pointer;
    padding: 0 0 12px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .cd-back:hover { color: #81d4fa; }
  .cd-header {
    display: flex;
    gap: 18px;
    align-items: flex-start;
    margin-bottom: 18px;
  }
  .cd-avatar {
    width: 100px;
    height: 100px;
    border-radius: 10px;
    object-fit: cover;
    background: #111;
    border: 2px solid #333;
    flex-shrink: 0;
  }
  .cd-info { flex: 1; }
  .cd-name {
    font-size: 20px;
    font-weight: 700;
    color: #eee;
    margin-bottom: 6px;
  }
  .cd-stats {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .cd-stat {
    font-size: 12px;
    color: #999;
  }
  .cd-stat b {
    color: #ccc;
    font-weight: 600;
  }
  .cd-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .cd-actions button {
    padding: 5px 14px;
    border: 1px solid #444;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    background: #333;
    color: #ccc;
    transition: all 0.15s;
  }
  .cd-actions button:hover { background: #444; color: #fff; }
  .cd-actions button.delete { background: #c62828; color: #fff; border-color: #c62828; }
  .cd-actions button.delete:hover { background: #e53935; }
  .cd-section-title {
    font-size: 13px;
    font-weight: 600;
    color: #aaa;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid #333;
  }
  .cd-sightings {
    max-height: 300px;
    overflow-y: auto;
  }

  /* --- Tracking canvas overlay --- */
  .tile canvas.tracking-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 15;
  }
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <h1>LAN Camera Viewer</h1>

  <button onclick="setGrid(1)" id="g1">1x1</button>
  <button onclick="setGrid(2)" id="g2" class="active">2x2</button>
  <button onclick="setGrid(3)" id="g3">3x3</button>
  <button onclick="setGrid(4)" id="g4">4x4</button>

  <button onclick="openCustomerModal()">Customers</button>
  <button class="primary" onclick="openAddModal()">+ Add Camera</button>
  <button onclick="openDiscoverModal()">Discover</button>
</div>

<!-- Camera Grid -->
<div class="grid g2" id="grid"></div>

<!-- Floating unknown faces bar -->
<div class="unknown-bar" id="unknownBar">
  <div class="unknown-bar-label">New Faces:</div>
</div>

<!-- Add Camera Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>Add Camera</h2>
    <label>Camera Name</label>
    <input type="text" id="camName" placeholder="e.g. Front Door">
    <label>Stream URL</label>
    <input type="text" id="camUrl" placeholder="rtsp://192.168.1.100:554/stream or http://ip:port/video">
    <label>Type</label>
    <select id="camType">
      <option value="rtsp">RTSP (IP Camera)</option>
      <option value="mjpeg">MJPEG (Webcam Agent)</option>
    </select>
    <div class="actions">
      <button onclick="closeAddModal()">Cancel</button>
      <button class="primary" onclick="addCamera()">Add</button>
    </div>
  </div>
</div>

<!-- Discover Modal -->
<div class="modal-overlay" id="discoverModal">
  <div class="modal">
    <h2>Discover Cameras on LAN</h2>
    <div id="discoverResults">
      <p style="color:#888">Click "Scan" to search for ONVIF cameras on your network.</p>
    </div>
    <div class="actions">
      <button onclick="closeDiscoverModal()">Close</button>
      <button class="primary" onclick="runDiscovery()">Scan</button>
    </div>
  </div>
</div>

<!-- Customer Management Modal -->
<div class="modal-overlay" id="customerModal">
  <div class="modal wide">
    <h2>Customer Management</h2>
    <div class="face-tabs">
      <button class="active" onclick="switchFaceTab('known')">Members</button>
      <button onclick="switchFaceTab('log')">Activity</button>
    </div>
    <div class="modal-body">
      <!-- List view -->
      <div id="customerListView">
        <!-- Known/Members tab -->
        <div class="face-tab-content active" id="tab-known">
          <div class="face-grid" id="knownGrid"></div>
        </div>
        <!-- Activity Log tab -->
        <div class="face-tab-content" id="tab-log">
          <div id="sightingsContainer"></div>
        </div>
      </div>
      <!-- Detail view (hidden by default) -->
      <div class="customer-detail" id="customerDetail"></div>
    </div>
    <div class="actions" style="margin-top:12px">
      <button onclick="closeCustomerModal()">Close</button>
    </div>
  </div>
</div>

<script>
const API = '';
let cameras = [];
let gridSize = 2;
let discoveredCameras = [];

// --- Grid ---
function setGrid(n) {
  gridSize = n;
  document.querySelectorAll('.toolbar button[id^="g"]').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('g' + n).classList.add('active');
  const grid = document.getElementById('grid');
  grid.className = 'grid g' + n;
}

// --- Load cameras ---
async function loadCameras() {
  try {
    const res = await fetch(API + '/api/cameras');
    cameras = await res.json();
  } catch (e) {
    console.error('Failed to load cameras:', e);
    cameras = [];
  }
  renderGrid();
}

// --- Render grid ---
function renderGrid() {
  const grid = document.getElementById('grid');
  while (grid.firstChild) grid.removeChild(grid.firstChild);

  if (cameras.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No cameras added. Click "+ Add Camera" or "Discover" to get started.';
    grid.appendChild(empty);
    return;
  }

  cameras.forEach(function(cam) {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.id = 'tile-' + cam.id;
    tile.addEventListener('click', function() { toggleFullscreen(cam.id); });

    // Label
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = cam.name;
    tile.appendChild(label);

    // Remove button
    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove-btn';
    removeBtn.textContent = '\u00D7';
    removeBtn.title = 'Remove';
    removeBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      removeCam(cam.id);
    });
    tile.appendChild(removeBtn);

    // Quality toggle button (only for cameras with switchable channels)
    if (cam.can_switch_quality) {
      var isHD = cam.quality === 'high';
      var qBtn = document.createElement('button');
      qBtn.className = 'quality-btn' + (isHD ? ' hd' : '');
      qBtn.textContent = isHD ? 'HD' : 'SD';
      qBtn.title = isHD ? '2560x1440 — Click for SD' : '768x432 — Click for HD';
      qBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        switchQuality(cam.id, cam.quality);
      });
      tile.appendChild(qBtn);
    }

    // All cameras use <img> — both RTSP (MJPEG via server) and webcam agents
    var img = document.createElement('img');
    img.src = cam.stream_url;
    img.alt = cam.name;
    img.addEventListener('error', function() {
      this.style.display = 'none';
      showOffline(cam.id);
    });
    tile.appendChild(img);

    // Tracking canvas overlay
    var canvas = document.createElement('canvas');
    canvas.className = 'tracking-canvas';
    canvas.id = 'track-' + cam.id;
    tile.appendChild(canvas);

    // Greeting overlay (hidden by default)
    var greeting = document.createElement('div');
    greeting.className = 'greeting-overlay';
    greeting.id = 'greeting-' + cam.id;
    tile.appendChild(greeting);

    grid.appendChild(tile);
  });
}

function showOffline(camId) {
  const tile = document.getElementById('tile-' + camId);
  if (!tile || tile.querySelector('.offline-overlay')) return;
  const overlay = document.createElement('div');
  overlay.className = 'offline-overlay';
  const dot = document.createElement('div');
  dot.className = 'dot';
  overlay.appendChild(dot);
  const text = document.createTextNode(' Offline \u2014 Reconnecting...');
  overlay.appendChild(text);
  tile.appendChild(overlay);
}

function hideOffline(camId) {
  const tile = document.getElementById('tile-' + camId);
  if (!tile) return;
  const overlay = tile.querySelector('.offline-overlay');
  if (overlay) overlay.remove();

async function runDiscovery() {
  const container = document.getElementById('discoverResults');
  while (container.firstChild) container.removeChild(container.firstChild);
  const loadingP = document.createElement('p');
  const spinner = document.createElement('span');
  spinner.className = 'spinner';
  loadingP.appendChild(spinner);
  loadingP.appendChild(document.createTextNode(' Scanning network...'));
  container.appendChild(loadingP);

  try {
    const res = await fetch(API + '/api/discover', { method: 'POST' });
    const results = await res.json();
    discoveredCameras = results;

    while (container.firstChild) container.removeChild(container.firstChild);

    if (results.length === 0) {
      const noResult = document.createElement('p');
      noResult.style.color = '#888';
      noResult.textContent = 'No ONVIF cameras found on the network.';
      container.appendChild(noResult);
      return;
    }

    const list = document.createElement('div');
    list.className = 'discover-list';

    results.forEach(function(cam, i) {
      const item = document.createElement('div');
      item.className = 'discover-item';

      const info = document.createElement('span');
      info.appendChild(document.createTextNode(cam.name));
      info.appendChild(document.createElement('br'));
      const urlSmall = document.createElement('small');
      urlSmall.style.color = '#888';
      urlSmall.textContent = cam.rtsp_url;
      info.appendChild(urlSmall);

      const addBtn = document.createElement('button');
      addBtn.textContent = 'Add';
      addBtn.addEventListener('click', function() { addDiscovered(i); });

      item.appendChild(info);
      item.appendChild(addBtn);
      list.appendChild(item);
    });

    container.appendChild(list);
  } catch (e) {
    while (container.firstChild) container.removeChild(container.firstChild);
    const errP = document.createElement('p');
    errP.style.color = '#f44';
    errP.textContent = 'Discovery failed: ' + e.message;
    container.appendChild(errP);
  }
}

async function addDiscovered(index) {

  try {
    await fetch(API + '/api/cameras', {

      body: JSON.stringify({ name: cam.name, url: cam.rtsp_url, type: 'rtsp' }),
    });
    closeDiscoverModal();
    loadCameras();
  } catch (e) {
    alert('Failed to add: ' + e.message);
  }
}

function switchFaceTab(tab) {
  document.querySelectorAll('#customerModal .face-tabs button').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('#customerModal .face-tab-content').forEach(function(t) { t.classList.remove('active'); });

async function loadFacesTab(status) {
  var gridId = status === 'unknown' ? 'unknownGrid' : 'knownGrid';
  var grid = document.getElementById(gridId);
  if (!grid) return;

  try {
    var res = await fetch(API + '/api/faces?status=' + status);
    var faces = await res.json();

    while (grid.firstChild) grid.removeChild(grid.firstChild);

    if (faces.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'face-empty';
      empty.textContent = status === 'unknown'
        ? 'No unknown faces detected yet. Stand in front of a camera!'
        : 'No labeled faces yet. Label unknown faces to start tracking.';
      empty.style.gridColumn = '1 / -1';
      grid.appendChild(empty);
      return;
    }

    faces.forEach(function(face) {
      var card = document.createElement('div');
      card.className = 'face-card';

      var img = document.createElement('img');
      img.src = face.image_url + '?t=' + Date.now();
      img.alt = face.name || 'Unknown';
      card.appendChild(img);

      var info = document.createElement('div');
      info.className = 'face-info';

      if (status === 'unknown') {
        // Name input
        var input = document.createElement('input');
        input.type = 'text';
        input.placeholder = 'Enter name...';
        input.id = 'name-' + face.id;
        input.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') labelFace(face.id);
          e.stopPropagation();
        });
        input.addEventListener('click', function(e) { e.stopPropagation(); });
        info.appendChild(input);

        var meta = document.createElement('div');
        meta.className = 'face-meta';
        meta.textContent = 'First seen: ' + formatTime(face.first_seen);
        info.appendChild(meta);

        var actions = document.createElement('div');
        actions.className = 'face-actions';

        var saveBtn = document.createElement('button');
        saveBtn.className = 'save';
        saveBtn.textContent = 'Save';
        saveBtn.addEventListener('click', function() { labelFace(face.id); });
        actions.appendChild(saveBtn);

        var ignoreBtn = document.createElement('button');
        ignoreBtn.className = 'ignore';
        ignoreBtn.textContent = 'Ignore';
        ignoreBtn.addEventListener('click', function() { ignoreFace(face.id); });
        actions.appendChild(ignoreBtn);

        info.appendChild(actions);
      } else {
        // Known face — clickable card
        card.style.cursor = 'pointer';
        card.addEventListener('click', function() { openCustomerDetail(face); });

        var nameEl = document.createElement('div');
        nameEl.className = 'face-name';
        nameEl.textContent = face.name;
        if (face.outfit_color) {
          var swatch = document.createElement('span');
          swatch.className = 'outfit-swatch';
          swatch.style.background = face.outfit_hex;
          swatch.title = "Today's outfit: " + face.outfit_color;
          nameEl.insertBefore(swatch, nameEl.firstChild);
        }
        info.appendChild(nameEl);

        var meta = document.createElement('div');
        meta.className = 'face-meta';
        var metaText = 'Last seen: ' + formatTime(face.last_seen);
        if (face.outfit_color) metaText += ' | Outfit: ' + face.outfit_color;
        meta.textContent = metaText;
        info.appendChild(meta);

        // Encoding count
        if (face.encoding_count) {
          var encMeta = document.createElement('div');
          encMeta.className = 'face-meta';
          encMeta.textContent = face.encoding_count + ' face sample' + (face.encoding_count > 1 ? 's' : '');
          info.appendChild(encMeta);
        }
      }

      card.appendChild(info);
      grid.appendChild(card);
    });
  } catch (e) {
    console.error('Failed to load faces:', e);
  }
}

async function loadSightings() {
  var container = document.getElementById('sightingsContainer');
  if (!container) return;

  try {
    var res = await fetch(API + '/api/sightings?limit=50');
    var sightings = await res.json();

      var empty = document.createElement('div');
      empty.className = 'face-empty';
      empty.textContent = 'No sightings recorded yet.';
      container.appendChild(empty);
      return;
    }

    var table = document.createElement('table');
    table.className = 'sightings-table';

    var thead = document.createElement('thead');
    var headRow = document.createElement('tr');
    ['Person', 'Camera', 'Time', 'Confidence'].forEach(function(h) {
      var th = document.createElement('th');
      th.textContent = h;
      headRow.appendChild(th);
    });
    thead.appendChild(headRow);
    table.appendChild(thead);

    sightings.forEach(function(s) {

      if (s.face_image_url) {

        faceImg.src = s.face_image_url;
        faceImg.alt = s.face_name;
        tdPerson.appendChild(faceImg);
      }
      var nameSpan = document.createElement('span');
      nameSpan.textContent = s.face_name || 'Unknown';
      tdPerson.appendChild(nameSpan);
      tr.appendChild(tdPerson);

      var tdCam = document.createElement('td');
      tdCam.textContent = s.camera_id;
      tr.appendChild(tdCam);

      // Time
      var tdTime = document.createElement('td');
      tdTime.textContent = formatTime(s.timestamp);
      tr.appendChild(tdTime);

      // Confidence
      var tdConf = document.createElement('td');
      tdConf.textContent = (s.confidence * 100).toFixed(1) + '%';
      tr.appendChild(tdConf);

      tbody.appendChild(tr);
    });
    table.appendChild(tbody);

  } catch (e) {
    console.error('Failed to load sightings:', e);
  }

function formatTime(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  var now = new Date();
  var diffMs = now - d;
  var diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1) return 'Just now';
  if (diffMin < 60) return diffMin + 'm ago';
  var diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return diffHr + 'h ago';
  var diffDay = Math.floor(diffHr / 24);
  if (diffDay < 7) return diffDay + 'd ago';
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

var _unknownBarIds = {};  // track what's already shown

async function pollUnknownBar() {
  try {
    var res = await fetch(API + '/api/faces?status=unknown');
    var faces = await res.json();
    var bar = document.getElementById('unknownBar');
    if (!bar) return;

    // Remove cards for faces no longer unknown
    var currentIds = {};
    faces.forEach(function(f) { currentIds[f.id] = true; });
    Object.keys(_unknownBarIds).forEach(function(id) {
      if (!currentIds[id]) {
        var card = document.getElementById('ubar-' + id);
        if (card) card.remove();
        delete _unknownBarIds[id];
      }
    });

    // Add new cards
    faces.forEach(function(face) {
      if (_unknownBarIds[face.id]) return;  // already showing
      _unknownBarIds[face.id] = true;

      var card = document.createElement('div');
      card.className = 'unknown-bar-card';
      card.id = 'ubar-' + face.id;

      var img = document.createElement('img');
      img.src = face.image_url + '?t=' + Date.now();
      img.alt = 'Unknown';
      card.appendChild(img);

      var input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'Name...';
      input.className = 'ubar-input';
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          quickLabel(face.id, input.value);
          e.preventDefault();
        } else if (e.key === 'Escape') {
          quickIgnore(face.id);
          e.preventDefault();
        }
        e.stopPropagation();
      });
      input.addEventListener('click', function(e) { e.stopPropagation(); });
      card.appendChild(input);

      var saveBtn = document.createElement('button');
      saveBtn.className = 'btn-save';
      saveBtn.textContent = 'Save';
      saveBtn.addEventListener('click', function() { quickLabel(face.id, input.value); });
      card.appendChild(saveBtn);

      var ignBtn = document.createElement('button');
      ignBtn.className = 'btn-ignore';
      ignBtn.textContent = 'X';
      ignBtn.title = 'Ignore';
      ignBtn.addEventListener('click', function() { quickIgnore(face.id); });
      card.appendChild(ignBtn);

      bar.appendChild(card);
    });

    // Show/hide bar
    if (faces.length > 0) {
      bar.classList.add('visible');
    } else {
      bar.classList.remove('visible');
    }
  } catch (e) {
    console.error('Unknown bar poll error:', e);
  }
}

async function quickLabel(faceId, name) {
  if (!name || !name.trim()) return;
  try {
    await fetch(API + '/api/faces/' + faceId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.trim() })
    });
    var card = document.getElementById('ubar-' + faceId);
    if (card) card.remove();
    delete _unknownBarIds[faceId];
    // Focus next input
    focusNextUnknownInput();
    // Hide bar if empty
    var bar = document.getElementById('unknownBar');
    if (bar && bar.querySelectorAll('.unknown-bar-card').length === 0) {
      bar.classList.remove('visible');

    var knownTab = document.getElementById('tab-known');
    if (knownTab && knownTab.style.display !== 'none') loadFacesTab('known');
  } catch (e) {
    console.error('Quick label error:', e);
  }
}

    var byCam = {};
    detections.forEach(function(d) {
      if (!byCam[d.camera_id]) byCam[d.camera_id] = {};
      if (!byCam[d.camera_id][d.name] || d.confidence > byCam[d.camera_id][d.name].confidence) {
        byCam[d.camera_id][d.name] = {
          confidence: d.confidence,
          outfit_color: d.outfit_color || '',
          outfit_hex: d.outfit_hex || ''
        };
      }
    });

    // Update greeting overlays on all camera tiles
    cameras.forEach(function(cam) {
      var el = document.getElementById('greeting-' + cam.id);
      if (!el) return;
      var people = byCam[cam.id];
      if (people && Object.keys(people).length > 0) {
        var names = Object.keys(people);
        var parts = names.map(function(name) {
          var info = people[name];
          var outfitDot = info.outfit_hex ? '<span class="outfit-dot" style="background:' + info.outfit_hex + '" title="' + info.outfit_color + ' outfit"></span>' : '';
          if (name === 'New Customer') {
            return '<span class="greeting-new">Welcome, New Customer!</span>' + outfitDot;
          }
          var conf = (info.confidence * 100).toFixed(0);
          return 'Hello, ' + name + '!<span class="greeting-conf">' + conf + '%</span>' + outfitDot;
        });
        el.innerHTML = '<span class="greeting-icon">&#9786;</span>' + parts.join(' &nbsp; ');
        el.classList.add('visible');
      } else {
        el.classList.remove('visible');
      }
    });
  } catch (e) {
    // Silently ignore polling errors
  }
}

setInterval(pollDetections, 1000);

// --- Tracking overlay (smooth floating labels + countdown) ---
var AUTO_IGNORE_SEC = 30;
var _trackTargets = {};   // cam_id -> [{face_id/method key, target bbox, ...}]
var _trackSmooth = {};    // key -> {x, y, opacity} — smoothed positions
var LERP = 0.15;          // smoothing factor (0=frozen, 1=instant)

function drawRoundRect(ctx, x, y, w, h, r) {
  if (w < 0) w = 0;
  if (r > h / 2) r = h / 2;
  if (r > w / 2) r = w / 2;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Poll data from server (updates targets, NOT drawing)
async function pollTracking() {
  try {
    var res = await fetch(API + '/api/tracking');
    var persons = await res.json();
    var byCam = {};
    persons.forEach(function(p) {
      if (!byCam[p.camera_id]) byCam[p.camera_id] = [];
      byCam[p.camera_id].push(p);
    });
    _trackTargets = byCam;
  } catch (e) {}
}
setInterval(pollTracking, 500);

// Render loop — smooth 60fps drawing
function renderTracking() {
  requestAnimationFrame(renderTracking);
  var now = Date.now();

  cameras.forEach(function(cam) {
    var canvas = document.getElementById('track-' + cam.id);
    if (!canvas) return;
    var tile = canvas.parentElement;
    var img = tile.querySelector('img');
    if (!img) return;

    var w = tile.clientWidth;
    var h = tile.clientHeight;
    if (canvas.width !== w) canvas.width = w;
    if (canvas.height !== h) canvas.height = h;

    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, w, h);

    var camPersons = _trackTargets[cam.id] || [];
    if (camPersons.length === 0) return;

    // object-fit: contain math
    var imgW = img.naturalWidth || w;
    var imgH = img.naturalHeight || h;
    var scl = Math.min(w / imgW, h / imgH);
    var dw = imgW * scl;
    var dh = imgH * scl;
    var ox = (w - dw) / 2;
    var oy = (h - dh) / 2;

    camPersons.forEach(function(p, idx) {
      var bbox = p.bbox;
      var targetX = ox + bbox[0] * dw;
      var targetY = oy + bbox[1] * dh;
      var targetW = bbox[2] * dw;
      var targetH = bbox[3] * dh;
      var targetCx = targetX + targetW / 2;

      // Unique key for smoothing
      var key = cam.id + '_' + (p.face_id || ('b' + idx));
      var sm = _trackSmooth[key];
      if (!sm) {
        sm = { bx: targetX, by: targetY, bw: targetW, bh: targetH, cx: targetCx, op: 0 };
        _trackSmooth[key] = sm;
      }

      // Lerp all values
      sm.bx += (targetX - sm.bx) * LERP;
      sm.by += (targetY - sm.by) * LERP;
      sm.bw += (targetW - sm.bw) * LERP;
      sm.bh += (targetH - sm.bh) * LERP;
      sm.cx += (targetCx - sm.cx) * LERP;
      sm.op += (1 - sm.op) * 0.18;

      var isNew = (p.name === 'New Customer' || p.name === '');
      var label = p.name || 'New Customer';

      // Colors
      var accent, glow, glowFaint;
      if (isNew) {
        accent = '#ff9800'; glow = 'rgba(255,152,0,0.45)'; glowFaint = 'rgba(255,152,0,0.08)';
      } else if (p.method === 'face') {
        accent = '#4caf50'; glow = 'rgba(76,175,80,0.4)'; glowFaint = 'rgba(76,175,80,0.06)';
      } else if (p.method === 'outfit') {
        accent = '#ab47bc'; glow = 'rgba(171,71,188,0.4)'; glowFaint = 'rgba(171,71,188,0.06)';
      } else {
        accent = '#42a5f5'; glow = 'rgba(66,165,245,0.35)'; glowFaint = 'rgba(66,165,245,0.06)';
      }

      ctx.save();
      ctx.globalAlpha = sm.op;

      // Target point: top-center of person body
      var targetX = sm.cx;
      var targetY = sm.by + 6;

      // Small dot at person's head
      ctx.beginPath();
      ctx.arc(targetX, targetY, 3, 0, Math.PI * 2);
      ctx.fillStyle = accent;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(targetX, targetY, 5.5, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      // ══════════════════════════════
      // ── Floating name label (pill) ──
      // ══════════════════════════════
      ctx.font = 'bold 12px "Segoe UI", sans-serif';
      var tw = ctx.measureText(label).width;
      var pillW = tw + 30;
      var pillH = 24;
      var hasCountdown = isNew && p.first_seen;
      var totalH = pillH + (hasCountdown ? 14 : 0) + 12;
      var lx = sm.cx - pillW / 2;

      // Clamp
      if (lx < 4) lx = 4;
      if (lx + pillW > w - 4) lx = w - 4 - pillW;
      var topY = sm.by - totalH;
      if (topY < 4) topY = 4;

      // Glow shadow
      ctx.shadowColor = glow;
      ctx.shadowBlur = 14;
      ctx.shadowOffsetY = 2;

      // Pill background
      drawRoundRect(ctx, lx, topY, pillW, pillH, 12);
      ctx.fillStyle = 'rgba(15,15,20,0.82)';
      ctx.fill();

      // Pill border
      ctx.shadowBlur = 0;
      drawRoundRect(ctx, lx, topY, pillW, pillH, 12);
      ctx.strokeStyle = accent;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Left accent dot + glow
      ctx.beginPath();
      ctx.arc(lx + 12, topY + pillH / 2, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = accent;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(lx + 12, topY + pillH / 2, 6, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      // Label text
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px "Segoe UI", sans-serif';
      ctx.fillText(label, lx + 22, topY + 16);

      // ══════════════════════════════════
      // ── Curved line from pill to person ──
      // ══════════════════════════════════
      var lineStartX = lx + pillW / 2;
      var lineStartY = topY + pillH;
      var lineEndX = targetX;
      var lineEndY = targetY;
      var dist = lineEndY - lineStartY;

      if (dist > 8) {
        // Offset for a nice S-curve effect
        var midY = lineStartY + dist * 0.45;
        var offsetX = (lineEndX - lineStartX) * 0.3;

        // Glow under the line
        ctx.beginPath();
        ctx.moveTo(lineStartX, lineStartY);
        ctx.bezierCurveTo(
          lineStartX + offsetX, midY - dist * 0.1,
          lineEndX - offsetX, midY + dist * 0.15,
          lineEndX, lineEndY
        );
        ctx.strokeStyle = glow;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.stroke();

        // Main line
        ctx.beginPath();
        ctx.moveTo(lineStartX, lineStartY);
        ctx.bezierCurveTo(
          lineStartX + offsetX, midY - dist * 0.1,
          lineEndX - offsetX, midY + dist * 0.15,
          lineEndX, lineEndY
        );
        ctx.strokeStyle = accent;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 3]);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // ══════════════════════════════
      // ── Countdown bar (New Customer) ──
      // ══════════════════════════════
      if (hasCountdown) {
        var firstMs = new Date(p.first_seen).getTime();
        var elapsed = (now - firstMs) / 1000;
        var remaining = Math.max(0, AUTO_IGNORE_SEC - elapsed);
        var ratio = remaining / AUTO_IGNORE_SEC;

        var barW = pillW - 8;
        var barH = 4;
        var barX = lx + 4;
        var barY = topY + pillH + 9;

        // Track
        drawRoundRect(ctx, barX, barY, barW, barH, 2);
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fill();

        // Fill
        if (ratio > 0) {
          var fillW = Math.max(4, barW * ratio);
          var barColor;
          if (ratio > 0.5) barColor = '#ff9800';
          else if (ratio > 0.2) barColor = '#ff5722';
          else barColor = '#f44336';

          ctx.shadowColor = barColor;
          ctx.shadowBlur = 6;
          drawRoundRect(ctx, barX, barY, fillW, barH, 2);
          ctx.fillStyle = barColor;
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        // Seconds text
        var secText = Math.ceil(remaining) + 's';
        ctx.font = '9px "Segoe UI", sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillText(secText, barX + barW + 3, barY + 4);
      }

      ctx.restore();
    });

    // Expire old smooth entries not in current targets
    var validKeys = {};
    camPersons.forEach(function(p, idx) {
      validKeys[cam.id + '_' + (p.face_id || ('b' + idx))] = true;
    });
  });

  // Clean stale smooth entries every 5s
  if (now - (renderTracking._lastClean || 0) > 5000) {
    renderTracking._lastClean = now;
    var allValid = {};
    cameras.forEach(function(cam) {
      var pp = _trackTargets[cam.id] || [];
      pp.forEach(function(p, idx) {
        allValid[cam.id + '_' + (p.face_id || ('b' + idx))] = true;
      });
    });
    Object.keys(_trackSmooth).forEach(function(k) {
      if (!allValid[k]) delete _trackSmooth[k];
    });
  }
}

requestAnimationFrame(renderTracking);

// --- Init ---
loadCameras();
</script>
</body>
</html>
